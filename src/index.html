<!doctype html>
<html lang="en" class="">
<head>

  <title>Schedify</title>
  <base href="/">

  <!-- Viewport with iOS safe area support -->

  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.webmanifest">

  <!-- Theme color for browser toolbar -->
  <meta name="theme-color" content="#4f46e5">

  <!-- iOS Safari PWA support -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Schedify">

  <!-- Apple touch icons for iOS home screen -->
  <link rel="apple-touch-icon" sizes="120x120" href="assets/icons/icon-128x128.png">

  <link rel="apple-touch-icon" sizes="180x180" href="assets/icons/icon-192x192.png">

  <!-- App icon -->
  <link rel="icon" type="image/png" href="assets/logo/schedify-logo.png">

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">

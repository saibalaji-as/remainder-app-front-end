@if (nudge) {
  <div class="nudge-banner" role="alert">
    <div class="nudge-banner__icon" aria-hidden="true">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="20" height="20">
        <path fill-rule="evenodd" d="M9.401 3.003c1.155-2 4.043-2 5.197 0l7.355 12.748c1.154 1.998-.29 4.5-2.599 4.5H4.645c-2.309 0-3.752-2.502-2.598-4.5L9.4 3.003zM12 8.25a.75.75 0 01.75.75v3.75a.75.75 0 01-1.5 0V9a.75.75 0 01.75-.75zm0 8.25a.75.75 0 100-1.5.75.75 0 000 1.5z" clip-rule="evenodd" />
      </svg>
    </div>

    <div class="nudge-banner__content">
      <p class="nudge-banner__title">{{ nudge.title }}</p>
      <p class="nudge-banner__meta">
        {{ nudge.contactName }} &middot; {{ nudge.scheduledAt | date: 'MMM d, h:mm a' }}
      </p>
    </div>

    <div class="nudge-banner__actions">
      <button
        class="nudge-banner__update-btn"
        type="button"
        (click)="onUpdateStatus()"
      >
        Update Status
      </button>

      <button
        class="nudge-banner__dismiss-btn"
        type="button"
        aria-label="Dismiss notification"
        (click)="onDismiss()"
      >
        &times;
      </button>
    </div>
  </div>
}

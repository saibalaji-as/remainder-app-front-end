<app-auth-shell title="Create your account" subtitle="Start your free trial">

  <!-- Error banner -->
  @if (error) {
    <div class="error-banner">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/>
        <line x1="12" y1="8" x2="12" y2="12"/>
        <line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
      <span>{{ error }}</span>
    </div>
  }

  <!-- Register form -->
  <form [formGroup]="form" (ngSubmit)="submit()" class="auth-form">

    <!-- Name field -->
    <div class="form-group">
      <label class="form-label" for="name">Your Name</label>
      <input
        id="name"
        class="form-input"
        [class.input-error]="form.get('name')?.invalid && form.get('name')?.touched"
        type="text"
        formControlName="name"
        autocomplete="name"
        placeholder="John Doe">
      <span class="form-error" *ngIf="form.get('name')?.hasError('required') && form.get('name')?.touched">
        Name is required
      </span>
    </div>

    <!-- Business Name field -->
    <div class="form-group">
      <label class="form-label" for="tenantName">Business Name</label>
      <input
        id="tenantName"
        class="form-input"
        [class.input-error]="form.get('tenantName')?.invalid && form.get('tenantName')?.touched"
        type="text"
        formControlName="tenantName"
        autocomplete="organization"
        placeholder="Acme Corp">
      <span class="form-error" *ngIf="form.get('tenantName')?.hasError('required') && form.get('tenantName')?.touched">
        Business name is required
      </span>
    </div>

    <!-- Email field -->
    <div class="form-group">
      <label class="form-label" for="email">Email</label>
      <input
        id="email"
        class="form-input"
        [class.input-error]="form.get('email')?.invalid && form.get('email')?.touched"
        type="email"
        formControlName="email"
        autocomplete="email"
        placeholder="you@example.com">
      <span class="form-error" *ngIf="form.get('email')?.hasError('required') && form.get('email')?.touched">
        Email is required
      </span>
      <span class="form-error" *ngIf="form.get('email')?.hasError('email') && form.get('email')?.touched">
        Enter a valid email
      </span>
    </div>

    <!-- Password field with show/hide toggle -->
    <div class="form-group">
      <label class="form-label" for="password">Password</label>
      <div class="input-wrapper">
        <input
          id="password"
          class="form-input"
          [class.input-error]="form.get('password')?.invalid && form.get('password')?.touched"
          [type]="hidePassword ? 'password' : 'text'"
          formControlName="password"
          autocomplete="new-password"
          placeholder="Min. 8 characters">
        <button
          type="button"
          class="input-suffix-btn"
          (click)="hidePassword = !hidePassword"
          aria-label="Toggle password visibility">
          <!-- Eye-off icon (password hidden) -->
          <svg *ngIf="hidePassword" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
            <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
            <line x1="1" y1="1" x2="23" y2="23"/>
          </svg>
          <!-- Eye icon (password visible) -->
          <svg *ngIf="!hidePassword" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
      <span class="form-error" *ngIf="form.get('password')?.hasError('required') && form.get('password')?.touched">
        Password is required
      </span>
      <span class="form-error" *ngIf="form.get('password')?.hasError('minlength') && form.get('password')?.touched">
        Minimum 8 characters
      </span>
    </div>

    <!-- Submit button (GradientPill style) -->
    <button class="btn btn-primary btn-full" type="submit" [disabled]="loading || form.invalid">
      @if (loading) {
        <svg class="spinner" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12a9 9 0 1 1-6.219-8.56"/>
        </svg>
        <span>Creating account...</span>
      } @else {
        <span>Create account</span>
      }
    </button>

  </form>

  <!-- Link to Login page -->
  <div class="auth-footer">
    <p>Already have an account? <a routerLink="/auth/login">Sign in</a></p>
  </div>

</app-auth-shell>
